<!DOCTYPE html>
<html>
<head>
  <title>Nowrin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
    <h1 class="logo">Nowrin</h1>
    <p>Connect with friends and the world around you 💙</p>
  </div>

  <!-- RIGHT SIDE LOGIN -->
  <div class="right">
    <div class="login-box">
      <input id="username" placeholder="Email or Username">
      <input id="password" type="password" placeholder="Password">

      <button class="login-btn" onclick="login()">Log In</button>

      <button class="register-btn" onclick="register()">Create New Account</button>
    </div>
  </div>

</div>

<hr>

<!-- POST SECTION -->
<div class="post-box">
  <input id="postInput" placeholder="What's on your mind?">
  <button onclick="createPost()">Post</button>
</div>

<ul id="posts"></ul>

<!-- CHAT -->
<div class="chat-box">
  <input id="message" placeholder="Type a message">
  <button onclick="sendMessage()">Send</button>
</div>

<ul id="chat"></ul>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="app.js"></script>

</body>
</html>
